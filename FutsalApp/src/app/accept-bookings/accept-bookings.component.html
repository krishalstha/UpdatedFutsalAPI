<div class="row mt-5">
  <div class="col-12">
    <div class="card p-4">
      <h2 class="mb-4 dashboard-title">Accept Bookings</h2>
    </div>
  </div>
</div>

<div class="row mt-4">
  <div class="col-12">
    <div class="card p-4">
      <div class="table-responsive">
        <table class="table booking-table text-center align-middle">
          <thead>
            <tr>
              <th>Email</th>
              <th>Date</th>
              <th>Time</th>
              <th>Duration</th>
              <th>Payment Method</th>
              <th>Contact</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let booking of bookingList">
              <td>{{ booking.email }}</td>
              <td>{{ booking.selectDate | date:'MMM d, y' }}</td>
              <td>{{ booking.selectTime }}</td>
              <td>{{ booking.selectDuration }}</td>
              <td>{{ booking.selectPaymentMethod }}</td>
              <td>{{ booking.contactNumber }}</td>

              <td>
                <span [ngClass]="{
                    'status-accepted': booking.status === 'Accepted',
                    'status-pending': booking.status !== 'Accepted'
                  }">
                  {{ booking.status }}
                </span>
              </td>

              <td>
                <div class="btn-group" role="group" *ngIf="booking.status !== 'Accepted'">
                  <button class="btn btn-gradient btn-lg me-2" 
                          (click)="acceptBooking(booking)">
                    <i class="fa-solid fa-check me-1"></i> Accept
                  </button>
                  <button class="btn btn-outline-gradient btn-lg" 
                          (click)="denyBooking(booking.id ?? 0)">
                    <i class="fa-solid fa-xmark me-1"></i> Deny
                  </button>
                 
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
