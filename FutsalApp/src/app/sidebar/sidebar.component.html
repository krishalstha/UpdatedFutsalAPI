<!-- Sidebar -->
<aside class="sidebar" [class.collapsed]="!isSidebarOpen">
  <h2 *ngIf="isSidebarOpen">Admin Panel</h2>
  <ul>
    <li class="nav-link">
      <a routerLink="/admin-dashboard/dashboard" routerLinkActive="active">
        <i class="fas fa-home"></i><span *ngIf="isSidebarOpen">Dashboard</span>
      </a>
    </li>
    <li class="nav-link">
      <a routerLink="/admin-dashboard/acceptbookings" routerLinkActive="active">
        <i class="fas fa-book-open"></i><span *ngIf="isSidebarOpen">Accept Bookings</span>
      </a>
    </li>
    <li class="nav-link">
      <a routerLink="/admin-dashboard/futsaldetailcomponent" routerLinkActive="active">
        <i class="fas fa-futbol"></i><span *ngIf="isSidebarOpen">Futsals</span>
      </a>
    </li>
    <!-- <li class="nav-link">
      <a routerLink="/admin-dashboard/bookingscreen/:futsalName" routerLinkActive="active">
        <i class="fas fa-book"></i><span *ngIf="isSidebarOpen">Booking / Edit</span>
      </a>
    </li> -->
    <li class="nav-link">
      <a routerLink="/admin-dashboard/report" routerLinkActive="active">
        <i class="fas fa-chart-line"></i><span *ngIf="isSidebarOpen">Reports</span>
      </a>
    </li>
  </ul>
</aside>
