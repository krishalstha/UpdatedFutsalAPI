<div class="booking-details-container">
  <!-- Booking Report -->
  <app-booking-detail-report></app-booking-detail-report>

  <!-- Booking Form -->
  <form
    #form="ngForm"
    (ngSubmit)="onSubmit(form)"
    [class.submitted]="formSubmitted"
    novalidate
    autocomplete="off"
    class="booking-form shadow-sm"
  >
    <h2 class="form-title">Booking Details</h2>
    <div class="row g-4">

      <!-- Email -->
      <div class="col-md-6">
        <label class="form-label" for="email">Email</label>
        <input
          id="email"
          type="email"
          class="form-control"
          name="email"
          [(ngModel)]="formData.email"
          readonly
        />
      </div>

      <!-- Select Date -->
      <div class="col-md-6">
        <label class="form-label" for="selectDate">Select Date</label>
        <input
          id="selectDate"
          type="date"
          class="form-control"
          name="selectDate"
          [(ngModel)]="formData.selectDate"
          (ngModelChange)="onDateChange()"
          required
          #selectDate="ngModel"
        />
        <div *ngIf="selectDate.invalid && (selectDate.dirty || selectDate.touched)" class="form-error">
          <small *ngIf="selectDate.errors?.['required']">Date is required.</small>
        </div>
      </div>

      <!-- Select Time -->
      <div class="col-md-6">
        <label class="form-label" for="selectTime">Select Time</label>
        <div class="input-group time-group">
          <input
            id="selectTime"
            type="time"
            class="form-control"
            name="selectTime"
            [(ngModel)]="formData.selectTime"
            (ngModelChange)="calculateEndTime()"
            required
            #selectTime="ngModel"
          />
         
        </div>
        <div *ngIf="selectTime.invalid && (selectTime.dirty || selectTime.touched)" class="form-error">
          <small *ngIf="selectTime.errors?.['required']">Time is required.</small>
        </div>
      </div>

      <!-- Duration -->
      <div class="col-md-6">
        <label class="form-label" for="selectDuration">Duration</label>
        <select
          id="selectDuration"
          class="form-select"
          name="selectDuration"
          [(ngModel)]="formData.selectDuration"
          (change)="onDurationChange()"
          required
          #selectDuration="ngModel"
        >
          <option value="" disabled selected>Select Duration</option>
          <option value="30 mins">30 mins</option>
          <option value="1 hour">1 hour</option>
          <option value="2 hours">2 hours</option>
        </select>
        <div *ngIf="selectDuration.invalid && (selectDuration.dirty || selectDuration.touched)" class="form-error">
          <small *ngIf="selectDuration.errors?.['required']">Duration is required.</small>
        </div>
      </div>

      <!-- Calculated End Time -->
      <div class="col-md-6">
        <label class="form-label" for="calculatedEndTime">Calculated End Time</label>
        <input
          id="calculatedEndTime"
          type="text"
          class="form-control"
          name="calculatedEndTime"
          [(ngModel)]="formData.calcTime"
          readonly
        />
      </div>

      <!-- Payment Method -->
      <div class="col-md-6">
        <label class="form-label" for="selectPaymentMethod">Payment Method</label>
        <select
          id="selectPaymentMethod"
          class="form-select"
          name="selectPaymentMethod"
          [(ngModel)]="formData.selectPaymentMethod"
          required
          #selectPaymentMethod="ngModel"
        >
          <option value="" disabled selected>Select Payment Method</option>
          <option value="Cash">Cash</option>
          <!-- <option value="Online">Esewa</option> -->
        </select>
        <div *ngIf="selectPaymentMethod.invalid && (selectPaymentMethod.dirty || selectPaymentMethod.touched)" class="form-error">
          <small *ngIf="selectPaymentMethod.errors?.['required']">Payment method is required.</small>
        </div>
      </div>

      <!-- Contact Number -->
      <div class="col-md-6">
        <label class="form-label" for="contactNumber">Contact Number</label>
        <input
          id="contactNumber"
          type="text"
          class="form-control"
          placeholder="10 Digit Number"
          name="contactNumber"
          [(ngModel)]="formData.contactNumber"
          required
          pattern="^[0-9]{10}$"
          maxlength="10"
          (input)="onNumberInput($event)"
          #contactNumber="ngModel"
        />
        <div *ngIf="contactNumber.invalid && (contactNumber.dirty || contactNumber.touched)" class="form-error">
          <small *ngIf="contactNumber.errors?.['required']">Contact number is required.</small>
          <small *ngIf="contactNumber.errors?.['pattern']">Please enter a valid 10-digit number.</small>
        </div>
      </div>

      <!-- Discount (Admin Only) -->
      <div class="col-md-6" *ngIf="isAdmin">
        <label class="form-label" for="discount">Discount (%) or (Rs)</label>
        <input
          id="discount"
          type="text"
          class="form-control"
          placeholder="e.g., 10 or 10%"
          name="discount"
          [(ngModel)]="formData.discount"
          (ngModelChange)="calculateFinalPrice()"
        />
      </div>

      <!-- Pricing -->
      <div class="col-md-6">
        <label class="form-label" for="pricing">Base Price</label>
        <input
          id="pricing"
          type="text"
          class="form-control"
          name="pricing"
          [(ngModel)]="formData.price"
          readonly
        />
      </div>

      <!-- Final Price -->
      <div class="col-md-6">
        <label class="form-label" for="finalPricing">Final Price</label>
        <input
          id="finalPricing"
          type="text"
          class="form-control final-price"
          name="finalPricing"
          [(ngModel)]="formData.finalPrice"
          readonly
        />
      </div>
    </div>

    <!-- Buttons -->
    <div class="form-actions mt-4">
      <button
        class="btn btn-gradient submit-btn"
        type="submit"
        [disabled]="formSubmitted || form.invalid"
      >
        {{ formSubmitted ? 'Processing...' : 'Submit' }}
      </button>
    
      <button
        *ngIf="isAdmin"
        class="btn btn-gradient ms-3"
        type="button"
        (click)="OnClickMakePayment()"
      >
        Make Payment
      </button>
    </div>
    
  </form>

  <!-- Payment Modal -->
  <div class="custom-modal" *ngIf="showPaymentModal && isAdmin">
    <div class="custom-modal-overlay" (click)="showPaymentModal = false"></div>
    <div class="custom-modal-content">
      <div class="modal-header">
        <h3>Make Payment</h3>
        <button class="close-btn" (click)="showPaymentModal = false">&times;</button>
      </div>
      <div class="modal-body">
        <app-payment
          *ngIf="bookingIdForPayment"
          [bookingId]="bookingIdForPayment"
          [finalPrice]="formData.finalPrice"
          (paymentSaved)="onPaymentsave($event)"
        ></app-payment>
      </div>
    </div>
  </div>

  <!-- Edit Booking Form -->
  <app-booking-detail-form (updatedBooking)="onBookingForEdit($event)"></app-booking-detail-form>
</div>
