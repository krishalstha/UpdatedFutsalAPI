<div class="booking-details-container p-3">
    <!-- The Report component is displayed first -->
    <app-booking-detail-report></app-booking-detail-report>
  
    <!-- The main booking form -->
    <form
      #form="ngForm"
      (ngSubmit)="onSubmit(form)"
      [class.submitted]="formSubmitted"
      novalidate
      autocomplete="off"
      class="p-4 shadow-lg rounded-3 bg-light mt-4 mb-4"
    >
      <div class="row">
        <!-- Email -->
        <div class="col-md-6 mb-4">
          <label for="email" class="form-label">Email</label>
          <input
            id="email"
            type="email"
            class="form-control"
            name="email"
            [(ngModel)]="formData.email"
            readonly
          />
        </div>
  
        <!-- Select Date -->
        <div class="col-md-6 mb-4">
          <label for="selectDate" class="form-label">Select Date</label>
          <input
            id="selectDate"
            type="date"
            class="form-control"
            name="selectDate"
            [(ngModel)]="formData.selectDate"
            (ngModelChange)="onDateChange()"
            required
            #selectDate="ngModel"
          />
          <div *ngIf="selectDate.invalid && (selectDate.dirty || selectDate.touched)" class="text-danger">
            <small *ngIf="selectDate.errors?.['required']">Date is required.</small>
          </div>
        </div>
  
        <!-- Select Time -->
        <div class="col-md-6 mb-4">
          <label for="selectTime" class="form-label">Select Time</label>
          <input
            id="selectTime"
            type="time"
            class="form-control"
            name="selectTime"
            [(ngModel)]="formData.selectTime"
            (ngModelChange)="calculateEndTime()"
            required
            #selectTime="ngModel"
          />
          <div *ngIf="selectTime.invalid && (selectTime.dirty || selectTime.touched)" class="text-danger">
            <small *ngIf="selectTime.errors?.['required']">Time is required.</small>
          </div>
        </div>
  
        <!-- Select Duration -->
        <div class="col-md-6 mb-4">
          <label for="selectDuration" class="form-label">Duration</label>
          <select
            id="selectDuration"
            class="form-select"
            name="selectDuration"
            [(ngModel)]="formData.selectDuration"
            (change)="onDurationChange()"
            required
            #selectDuration="ngModel"
          >
            <option value="" disabled selected>Select Duration</option>
            <option value="30 mins">30 mins</option>
            <option value="1 hour">1 hour</option>
            <option value="2 hours">2 hours</option>
          </select>
          <div *ngIf="selectDuration.invalid && (selectDuration.dirty || selectDuration.touched)" class="text-danger">
            <small *ngIf="selectDuration.errors?.['required']">Duration is required.</small>
          </div>
        </div>
  
  
        <!-- Calculated End Time -->
        <div class="col-md-6 mb-4">
          <label for="calculatedEndTime" class="form-label">Calculated End Time</label>
          <input
            id="calculatedEndTime"
            type="text"
            class="form-control"
            name="calculatedEndTime"
            [(ngModel)]="formData.calcTime"
            readonly
          />
        </div>
  
        <!-- Select Payment Method -->
        <div class="col-md-6 mb-4">
          <label for="selectPaymentMethod" class="form-label">Payment Method</label>
          <select
            id="selectPaymentMethod"
            class="form-select"
            name="selectPaymentMethod"
            [(ngModel)]="formData.selectPaymentMethod"
            required
            #selectPaymentMethod="ngModel"
          >
            <option value="" disabled selected>Select Payment Method</option>
            <option value="Cash">Cash</option>
            <option value="Online">Esewa</option>
          </select>
          <div *ngIf="selectPaymentMethod.invalid && (selectPaymentMethod.dirty || selectPaymentMethod.touched)" class="text-danger">
            <small *ngIf="selectPaymentMethod.errors?.['required']">Payment method is required.</small>
          </div>
        </div>
  
        <!-- Contact Number -->
        <div class="col-md-6 mb-4">
          <label for="contactNumber" class="form-label">Contact Number</label>
          <input
            id="contactNumber"
            type="text"
            class="form-control"
            placeholder="10 Digit Number"
            name="contactNumber"
            [(ngModel)]="formData.contactNumber"
            required
            pattern="^[0-9]{10}$"
            maxlength="10"
            (input)="onNumberInput($event)"
            #contactNumber="ngModel"
          />
          <div *ngIf="contactNumber.invalid && (contactNumber.dirty || contactNumber.touched)" class="text-danger">
            <small *ngIf="contactNumber.errors?.['required']">Contact number is required.</small>
            <small *ngIf="contactNumber.errors?.['pattern']">Please enter a valid 10-digit number.</small>
          </div>
        </div>
        
        <!-- Discount Input (NEW FIELD) -->
        <div class="col-md-6 mb-4">
          <label for="discount" class="form-label">Discount (%) or (Rs)</label>
          <input
            id="discount"
            type="text"
            class="form-control"
            placeholder="e.g., 10 or 10%"
            name="discount"
            [(ngModel)]="formData.discount"
            (ngModelChange)="calculateFinalPrice()"
          />
        </div>
        
        <!-- Pricing (Base Price) -->
        <div class="col-md-6 mb-4">
          <label for="pricing" class="form-label">Pricing (Base)</label>
          <input
            id="pricing"
            type="text"
            class="form-control"
            name="pricing"
            [(ngModel)]="formData.price"
            readonly
          />
        </div>
  
        <!-- Final Price -->
        <div class="col-md-6 mb-4">
          <label for="finalPricing" class="form-label">Final Price</label>
          <input
            id="finalPricing"
            type="text"
            class="form-control"
            name="finalPricing"
            [(ngModel)]="formData.finalPrice"
            readonly
          />
        </div>
      </div>
  
      
      <!-- Center-aligned Submit Button -->
      <div class="d-flex justify-content-center">
        <button
          class="btn btn-primary submit-btn me-2"
          type="submit"
          [disabled]="formSubmitted || form.invalid"
        >
          {{ formSubmitted ? 'Processing...' : 'Submit' }}
        </button>
        <!-- Make Payment Button -->
  <div class="d-flex justify-content-center mt-3">
    <button class="btn btn-success" (click)="OnClickMakePayment()">
      Make Payment
    </button>
  </div>
  
  <!-- Payment Modal -->
  <div class="custom-modal" *ngIf="showPaymentModal">
    <div class="custom-modal-overlay" (click)="showPaymentModal = false"></div>
    <div class="custom-modal-content">
      <div class="modal-header">
        <h3>Make Payment</h3>
        <button class="close-btn" (click)="showPaymentModal = false">&times;</button>
      </div>
      <div class="modal-body">
        <app-payment
    *ngIf="bookingIdForPayment"
    [bookingId]="bookingIdForPayment"
    [finalPrice]="formData.finalPrice"
    (paymentSaved)="onPaymentsave($event)"
  ></app-payment>
  
      </div>
    </div>
  </div>
  
      </div>
      
    </form>
  
    <!-- The form for editing is displayed after the main form -->
    <app-booking-detail-form (updatedBooking)="onBookingForEdit($event)"></app-booking-detail-form>
  </div>
